<!DOCTYPE html>
<html>
<head>

<style>

table{
    width:80%;
    border-collapse:collapse;
    text-align:center;
}

th{
    background-color:lightblue;
    border:1px solid black;
    padding:10px;
}

td{
    border:1px solid black;
    padding:10px;
}

tr:nth-child(even){
    background-color:#f2f2f2;
}

</style>

</head>

<body>

<table>

<tr>
<th>Event Name</th>
<th>Date</th>
<th>Location</th>
</tr>

<tr>
<td>Music Fest</td>
<td>10-06-2026</td>
<td>City Hall</td>
</tr>

<tr>
<td>Sports Day</td>
<td>15-06-2026</td>
<td>Stadium</td>
</tr>

<tr>
<td>Tech Expo</td>
<td>20-06-2026</td>
<td>Convention Center</td>
</tr>

</table>

</body>
</html>
